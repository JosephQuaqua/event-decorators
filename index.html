<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Responsive Design -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Browser Theme -->
    <meta name="theme-color" content="#0F5132" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- SEO -->
    <title>Event Decorators | Creating Moments, Crafting Memories</title>

    <meta
      name="description"
      content="Event Decorators is Liberia's premier event planning and decoration company, specializing in luxury weddings, birthdays, graduations, corporate events, catering, cakes, tailoring, rentals, and unforgettable celebrations."
    />

    <meta
      name="keywords"
      content="Event Decorators, Liberia, Event Planning, Wedding Decoration, Birthday Decoration, Graduation Decoration, Corporate Events, Catering, Cakes, Rentals, Event Management, Monrovia, Luxury Events"
    />

    <meta name="author" content="Event Decorators" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="light" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Event Decorators" />
    <meta
      property="og:title"
      content="Event Decorators | Creating Moments, Crafting Memories"
    />
    <meta
      property="og:description"
      content="Luxury event decoration, catering, cakes, tailoring, rentals, and complete event planning services throughout Liberia."
    />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Event Decorators | Creating Moments, Crafting Memories"
    />
    <meta
      name="twitter:description"
      content="Luxury event planning and decoration services in Liberia."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/og-image.jpg"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Uncomment if loading Google Fonts -->
    <!--
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    -->
  </head>

  <body>
    <noscript>
      JavaScript is required to run the Event Decorators website.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
